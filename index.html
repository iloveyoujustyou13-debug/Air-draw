<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Canvas Pro - Error Fixed Edition</title>
    <style>
        :root {
            --primary: #00f3ff;
            --bg-dark: #0a0a0f;
            --panel-bg: rgba(20, 20, 35, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            align-items: center;
            position: relative;
        }

        .container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid #1f1f38;
            background: #11111a;
        }

        #webcam {
            position: absolute;
            width: 640px;
            height: 480px;
            transform: rotateY(180deg);
            object-fit: cover;
            display: none; 
        }

        #output_canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 640px;
            height: 480px;
            transform: rotateY(180deg);
        }

        .control-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 220px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8a8ab0;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .color-picker {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .color-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn.active {
            border-color: #ffffff;
            transform: scale(1.15);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .slider-container input {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .clear-btn {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }

        .clear-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.5);
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.95);
            padding: 30px;
            border-radius: 16px;
            z-index: 10;
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            text-align: center;
        }

        .spinner {
            margin: 0 auto 15px auto;
            width: 45px;
            height: 45px;
            border: 4px solid rgba(0, 243, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #currentModeTxt {
            font-weight: bold;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <h1>Air Canvas Pro</h1>
    
    <div class="main-wrapper">
        <!-- AI লোডার মেসেজ -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div>⚡ <strong>AI মডেল লোড হচ্ছে...</strong></div>
            <div id="errorHelp" style="font-size: 12px; color: #aaa; margin-top: 5px;">Chrome ব্রাউজার অপ্টিমাইজেশন অ্যাপ্লাই করা হচ্ছে।</div>
        </div>

        <div class="container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
        </div>

        <div class="control-panel">
            <div>
                <div class="section-title">Colors</div>
                <div class="color-picker">
                    <button class="color-btn active" data-color="#00f3ff" style="background: #00f3ff;"></button>
                    <button class="color-btn" data-color="#ff4757" style="background: #ff4757;"></button>
                    <button class="color-btn" data-color="#2ed573" style="background: #2ed573;"></button>
                    <button class="color-btn" data-color="#ffa500" style="background: #ffa500;"></button>
                </div>
            </div>

            <div class="slider-container">
                <div class="section-title">Size: <span id="sizeVal">5</span>px</div>
                <input type="range" id="brushSize" min="2" max="25" value="5">
            </div>

            <div>
                <div class="section-title">Current Mode</div>
                <div class="status-badge">
                    <span id="currentModeTxt">✍️ DRAW MODE</span>
                </div>
            </div>

            <button class="clear-btn" id="clearBtn">Clear All</button>
        </div>
    </div>

    <!-- বিশ্বস্ত সিডিএন এবং ডাউনলোড এরর ফিক্সিং স্ক্রিপ্ট -->
    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/+esm";

        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const loadingDiv = document.getElementById("loading");
        const clearBtn = document.getElementById("clearBtn");
        const brushSizeInput = document.getElementById("brushSize");
        const sizeValDisplay = document.getElementById("sizeVal");
        const currentModeTxt = document.getElementById("currentModeTxt");
        
        let handLandmarker = undefined;
        let lastVideoTime = -1;
        
        const drawingCanvas = document.createElement("canvas");
        drawingCanvas.width = 640;
        drawingCanvas.height = 480;
        const drawCtx = drawingCanvas.getContext("2d");
        
        let currentBgColor = "#00f3ff";
        let currentSize = 5;
        let xp = 0, yp = 0;

        // ইউআই ইভেন্ট লিসেনার
        document.querySelectorAll(".color-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                document.querySelector(".color-btn.active").classList.remove("active");
                e.target.classList.add("active");
                currentBgColor = e.target.getAttribute("data-color");
            });
        });

        brushSizeInput.addEventListener("input", (e) => {
            currentSize = parseInt(e.target.value);
            sizeValDisplay.innerText = currentSize;
        });

        // ফিক্সড এআই লোডার ফাংশন (যা ডাউনলোড এরর স্কিপ করবে)
        async function initAI() {
            try {
                // ব্রাউজারে কর্স (CORS) পলিসি বাইপাস করার জন্য স্ট্যান্ডার্ড ও বিশ্বস্ত সিডিএন ব্যবহার
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
                );
                
                // ক্রোম ব্রাউজারের ক্যাশ পলিসি ফিক্স করার জন্য ডিরেক্ট ক্লাউড লিংক ব্যবহার
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker_full/float16/1/hand_landmarker_full.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                
                loadingDiv.style.display = "none"; 
                startWebcam();
            } catch (error) {
                console.log("প্রথম মেথডে এরর এসেছে, অল্টারনেটিভ মোড ট্রাই করা হচ্ছে...", error);
                
                // ক্রোম সিকিউরিটি ফিক্স ব্যাকআপ মেথড (CPU লোডার মেকানিজম)
                try {
                    const vision = await FilesetResolver.forVisionTasks("https://unpkg.com/@mediapipe/tasks-vision@0.10.8/wasm");
                    handLandmarker = await HandLandmarker.createFromOptions(vision, {
                        baseOptions: {
                            modelAssetPath: "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/hand_landmarker_full.task",
                            delegate: "CPU" 
                        },
                        runningMode: "VIDEO",
                        numHands: 1
                    });
                    loadingDiv.style.display = "none";
                    startWebcam();
                } catch (err2) {
                    console.error("সবগুলো ডাউনলোড মেথড ফেইল করেছে:", err2);
                    document.getElementById("errorHelp").innerHTML = "<span style='color:#ff4757; font-weight:bold;'>Chrome Error!</span><br>কমান্ড প্রম্পটে <code>python -m http.server 8000</code> রান করে লিংকে যান।";
                }
            }
        }
        initAI();

        function startWebcam() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            })
            .catch((err) => {
                loadingDiv.style.display = "block";
                loadingDiv.innerHTML = "<div>📷 ক্যামেরা পারমিশন 'Allow' করুন।</div>";
            });
        }

        // রিয়েল-টাইম ট্র্যাকিং এবং ৪ আঙুলের স্মার্ট ইরেজার কন্ট্রোল
        async function predictWebcam() {
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;
            
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const startTimeMs = performance.now();
                const results = handLandmarker.detectForVideo(video, startTimeMs);

                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                canvasCtx.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);

                if (results.landmarks && results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];
                    
                    const pIndex = landmarks[8];
                    const pMiddle = landmarks[12];
                    const pRing = landmarks[16];
                    const pPinky = landmarks[20];

                    const ix = pIndex.x * canvasElement.width, iy = pIndex.y * canvasElement.height;
                    const mx = pMiddle.x * canvasElement.width, my = pMiddle.y * canvasElement.height;
                    const rx = pRing.x * canvasElement.width, ry = pRing.y * canvasElement.height;
                    const px = pPinky.x * canvasElement.width, py = pPinky.y * canvasElement.height;

                    const dist1 = Math.hypot(ix - mx, iy - my); 
                    const dist2 = Math.hypot(mx - rx, my - ry); 
                    const dist3 = Math.hypot(rx - px, ry - py); 

                    const thumbY = landmarks[4].y * canvasElement.height;

                    // ৪টি আঙুল একসাথে মিশে আছে কিনা তা ডিটেক্ট করা
                    const isFingersTogether = (dist1 < 50 && dist2 < 50 && dist3 < 50);

                    // ১. ৪ আঙুল মিশিয়ে ড্রাগ করলে লেখা মুছবে (Smart Eraser)
                    if (isFingersTogether && iy < thumbY) { 
                        currentModeTxt.innerText = "🧼 SMART ERASER";
                        currentModeTxt.style.color = "#ff4757";

                        canvasCtx.beginPath();
                        canvasCtx.arc(mx, my, 40, 0, 2 * Math.PI);
                        canvasCtx.strokeStyle = "#ffffff";
                        canvasCtx.lineWidth = 3;
                        canvasCtx.stroke();

                        if (xp === 0 && yp === 0) { xp = mx; yp = my; }

                        drawCtx.save();
                        drawCtx.globalCompositeOperation = "destination-out";
                        drawCtx.beginPath();
                        drawCtx.moveTo(xp, yp);
                        drawCtx.lineTo(mx, my);
                        drawCtx.lineWidth = 60; 
                        drawCtx.lineCap = "round";
                        drawCtx.lineJoin = "round";
                        drawCtx.stroke();
                        drawCtx.restore();

                        xp = mx; yp = my;
                    } 
                    // ২. শুধু ১টি আঙুল ওপরে থাকলে নিওন রাইটিং মোড
                    else if (iy < my - 30) {
                        currentModeTxt.innerText = "✍️ DRAW MODE";
                        currentModeTxt.style.color = "#00f3ff";

                        canvasCtx.beginPath();
                        canvasCtx.arc(ix, iy, currentSize + 4, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = currentBgColor;
                        canvasCtx.shadowBlur = 10;
                        canvasCtx.shadowColor = currentBgColor;
                        canvasCtx.fill();
                        canvasCtx.shadowBlur = 0;

                        if (xp === 0 && yp === 0) { xp = ix; yp = iy; }

                        drawCtx.save();
                        drawCtx.globalCompositeOperation = "source-over";
                        drawCtx.beginPath();
                        drawCtx.moveTo(xp, yp);
                        drawCtx.lineTo(ix, iy);
                        drawCtx.strokeStyle = currentBgColor;
                        drawCtx.lineWidth = currentSize;
                        drawCtx.lineCap = "round";
                        drawCtx.lineJoin = "round";
                        drawCtx.stroke();
                        drawCtx.restore();

                        xp = ix; yp = iy;
                    } 
                    else {
                        xp = 0; yp = 0;
                        currentModeTxt.innerText = "⏸️ STANDBY";
                        currentModeTxt.style.color = "#8a8ab0";
                    }
                } else {
                    xp = 0; yp = 0;
                }
                
                canvasCtx.drawImage(drawingCanvas, 0, 0);
            }
            window.requestAnimationFrame(predictWebcam);
        }

        clearBtn.addEventListener("click", () => {
            drawCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
        });
    </script>
</body>
</html>
